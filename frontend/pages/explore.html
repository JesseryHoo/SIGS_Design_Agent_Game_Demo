<!-- explore.html — 阶段二：场景漫游与选点
     职责：展示 UE Pixel Streaming 三维校园场景，用户选择感兴趣的位置后跳转到创意输入 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景漫游</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/loading.css">
    <style>
        .ue-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: var(--font-size-lg);
            margin-bottom: var(--space-lg);
        }
        .location-info {
            text-align: center;
            margin-bottom: var(--space-lg);
        }
        .location-info .label {
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            margin-bottom: var(--space-sm);
        }
        .location-info .name {
            font-size: var(--font-size-lg);
            font-weight: 600;
        }
        .explore-hint {
            text-align: center;
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            margin-top: var(--space-md);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <main class="main-content">
            <div class="ue-viewport" id="ue-viewport">
                UE Pixel Streaming 占位区域
            </div>
            <div class="location-info">
                <p class="label">当前选中</p>
                <p class="name" id="location-name">尚未选择位置</p>
            </div>
            <div style="text-align: center;">
                <button class="btn btn-primary" id="btn-continue" disabled>选择这里，告诉AI我的想法 →</button>
            </div>
            <p class="explore-hint">走进这座校园，找一个让你有感觉的地方</p>
        </main>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/router.js"></script>
    <script>
        // TODO: 集成 UE Pixel Streaming，处理位置选择交互
        const locationName = document.getElementById("location-name");
        const btnContinue = document.getElementById("btn-continue");

        // 占位：模拟位置选择
        document.getElementById("ue-viewport").addEventListener("click", () => {
            locationName.textContent = "图书馆前庭（示例）";
            btnContinue.disabled = false;
            setState("selectedLocation", {
                x: 100.0, y: 0.0, z: 50.0,
                label: "图书馆前庭",
                screenshot: null,
            });
        });

        btnContinue.addEventListener("click", () => {
            navigateTo(PAGES.CREATE);
        });
    </script>
</body>
</html>
