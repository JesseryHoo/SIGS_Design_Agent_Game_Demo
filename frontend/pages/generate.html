<!-- generate.html — 阶段五：生成与呈现
     职责：展示加载动画和分步文案，轮询生成状态，完成后展示原图 vs 新设计对比 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成结果</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/loading.css">
    <style>
        .result-area {
            margin-bottom: var(--space-xl);
        }
        .comparison-container {
            margin-bottom: var(--space-lg);
        }
        .comparison-item {
            text-align: center;
        }
        .comparison-item img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
        }
        .ai-response {
            background: var(--bg-secondary);
            padding: var(--space-lg);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--accent-green);
            margin-bottom: var(--space-xl);
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .actions {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <main class="main-content" style="justify-content: flex-start; padding-top: var(--space-xl);">
            <!-- Loading state -->
            <div id="loading-state" style="text-align: center; padding: var(--space-2xl) 0;">
                <div class="loading-spinner" style="margin: 0 auto var(--space-lg);"></div>
                <div class="loading-steps">
                    <p class="step">AI正在理解你的想法……</p>
                    <p class="step">正在分析这个空间的光线与尺度……</p>
                    <p class="step">正在把你的感受转化为空间语言……</p>
                    <p class="step">你的校园，正在生长中……</p>
                </div>
            </div>

            <!-- 结果展示区域（初始隐藏） -->
            <div id="result-state" style="display: none;">
                <div class="result-area">
                    <div class="comparison-container">
                        <div class="comparison-item">
                            <p class="comparison-label">原始场景</p>
                            <div class="skeleton" style="aspect-ratio: 16/9;"></div>
                        </div>
                        <div class="comparison-item">
                            <p class="comparison-label">新生成的设计</p>
                            <div class="skeleton" style="aspect-ratio: 16/9;"></div>
                        </div>
                    </div>
                </div>

                <div class="ai-response" id="ai-response">
                    AI 的回应将显示在这里...
                </div>

                <div class="actions">
                    <button class="btn btn-primary" id="btn-share">分享这个设计 →</button>
                    <button class="btn btn-secondary" id="btn-adjust">重新调整想法</button>
                    <button class="btn btn-ghost" id="btn-explore">继续探索其他地方</button>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/router.js"></script>
    <script>
        // TODO: 轮询 GET /api/v1/designs/{id}/status 直到生成完成
        // 当前为占位：延迟后模拟显示结果
        setTimeout(() => {
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("result-state").style.display = "block";
        }, 3000);

        document.getElementById("btn-share").addEventListener("click", () => {
            navigateTo(PAGES.GALLERY);
        });

        document.getElementById("btn-adjust").addEventListener("click", () => {
            navigateTo(PAGES.CREATE);
        });

        document.getElementById("btn-explore").addEventListener("click", () => {
            navigateTo(PAGES.EXPLORE);
        });
    </script>
</body>
</html>
